name: Build & Package for SharePoint

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v3
        with:
          bun-version: latest

      - run: bun install
      - run: bun run build

      - uses: actions/upload-artifact@v5
        with:
          name: nc-dashboard-dist
          path: dist/
